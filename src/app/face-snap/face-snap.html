<div class = 'face-snap-card' [class.snapped]="userSnapped">
    <h2>{{faceSnap.title | titlecase }}</h2>
    <img [src]="faceSnap.imageUrl" [alt]="faceSnap.title">
    @if(faceSnap.location){
        <p>Lieu : {{faceSnap.location}}</p>
    }
    <p>Mis en ligne le {{faceSnap.createdAt}}</p>
    <p>{{faceSnap.description}}</p>
    <p>
        <button (click)="onSnap()">snap</button>
        <span [style.color]="'rgb(0, ' + faceSnap.snaps + ', 0)'">🤌 {{faceSnap.snaps}}</span>
    </p>
</div>
